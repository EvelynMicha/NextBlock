<!DOCTYPE html>
<html>
  <head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <link rel="shortcut icon" href="static/favicon.ico">
    <title>Scratch 3.0 GUI: Compatibility Testing</title>
  <script defer src="compatibilitytesting.js?v=20260303c"></script></head>
  <body>
    <div id="app"></div>
    
    <script>
      // Safety net: clear any hue/sepia filters that might persist from modes.
      const clearFilters = () => {
        document.documentElement.style.filter = '';
        document.body.style.filter = '';
        document.documentElement.style.height = '';
      };
      clearFilters();
      // Run a couple more times in case scripts set them later.
      setTimeout(clearFilters, 200);
      setTimeout(clearFilters, 1000);
    </script>
  </body>
</html>
