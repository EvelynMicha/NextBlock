<!DOCTYPE html>
<html>
  <head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <link rel="shortcut icon" href="static/favicon.ico">
    <title>NextBlock: Compatibility Testing</title>
  <script defer src="compatibilitytesting.js?v=20260303b"></script></head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        const clearFilters = () => {
          document.documentElement.style.filter = '';
          document.documentElement.style.height = '';
          document.body.style.filter = '';
        };
        clearFilters();
        setTimeout(clearFilters, 200);
        setTimeout(clearFilters, 1000);
        const observer = new MutationObserver(clearFilters);
        observer.observe(document.documentElement, {attributes: true, attributeFilter: ['style']});
      })();
    </script>
  </body>
</html>
